[bindings.python.external_packages]
# This fixture does not create a Python package, so we want all modules to be top-level modules.
custom_types = ""
ext_types_custom = ""
uniffi_one_ns = ""
imported_types_sublib = ""

[bindings.ruby.external_packages]
uniffi_one_ns = "UniffiOneNs"
imported_types_sublib = "ImportedTypesSublib"

[bindings.ruby.custom_types.Url]
type_name = "URI"
imports = ["uri"]
lift = "URI.parse({})"
lower = "{}.to_s"
